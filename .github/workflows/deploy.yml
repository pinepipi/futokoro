name: deploy
on:
  push:
    branches: [main]

# Required GitHub secrets:
#   CLOUDFLARE_API_TOKEN  - token with "Account / Cloudflare Pages / Edit"
#   CLOUDFLARE_ACCOUNT_ID - Cloudflare account id
jobs:
  gate-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm ci

      # OS-independent gate (pixel visual snapshots stay local on Windows; do not run here)
      - run: npm run build
      - run: node --test domain.test.js io.test.js
      - run: npm run test:publish

      - name: Publish to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=futokoro-com --branch=main
