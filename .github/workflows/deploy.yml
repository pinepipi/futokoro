name: deploy

# 本番自動デプロイ（憲法 Part2 機械ゲート）。
# フロー: gate → preview deploy → preview smoke → 本番 deploy → 本番 smoke → 失敗時 auto-rollback
# 強い保証 = preview を smoke で検証してから本番へ昇格する（壊れたビルドは本番に到達しない）。
#
# 必要な GitHub secrets:
#   CLOUDFLARE_API_TOKEN  - "Account / Cloudflare Pages / Edit" 権限のトークン
#   CLOUDFLARE_ACCOUNT_ID - Cloudflare account id
on:
  push:
    branches: [main]

# 最小権限（既定の広い権限を絞る）
permissions:
  contents: read

# 本番デプロイは同時実行1（割り込みでデプロイを取り消さず、順序を保つ）
concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  # ── ① ゲート再実行（デプロイ対象SHAで required checks 相当を緑確認）──────────
  gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: node --test domain.test.js io.test.js tests/ci-guard.test.js
      - run: npm run test:publish
      # NOTE: test:e2e は現状 main で RED のため gate から除外（緑化後に追加・別タスク）。

  # ── ② preview デプロイ → preview URL を smoke（本番昇格の前提ゲート）──────────
  preview:
    needs: gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
      - name: Deploy preview to Cloudflare Pages
        id: deploy_preview
        uses: cloudflare/wrangler-action@da0e0dfe58b7a431659754fdf3f186c529afbe65 # v3.14.1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=futokoro-com --branch=ci-preview
      - name: Smoke test preview URL
        # 未信頼な action 出力は run: のシェルに直接展開せず env 経由で渡す（injection回避）。
        # smoke-http.mjs 側で許可URLを allowlist 検証する。
        env:
          SMOKE_URL: ${{ steps.deploy_preview.outputs.deployment-url }}
        run: node scripts/smoke-http.mjs

  # ── ③ 本番デプロイ → 本番 URL を smoke ─────────────────────────────────────
  #   デプロイ前に「現在serving中の本番デプロイID（=last-known-good）」をCF APIで控える。
  #   本番smokeが失敗したら rollback ジョブがそのIDへ巻き戻す（直前gitコミットではなく
  #   実際にservingされていた成功デプロイへ戻す＝Codex High-1/High-2 対応）。
  deploy-production:
    needs: preview
    runs-on: ubuntu-latest
    environment: production
    outputs:
      lkg_id: ${{ steps.lkg.outputs.id }}
      lkg_url: ${{ steps.lkg.outputs.url }}
      production_attempted: ${{ steps.attempt.outputs.attempted }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
      - name: Capture currently-serving production deployment (last-known-good)
        id: lkg
        # CF project の canonical_deployment = 現在 serving 中の本番デプロイ。
        # 「最新成功デプロイ」ではなく「いま配信中」を控えるのが正しい巻き戻し先。
        env:
          CF_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CF_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set -euo pipefail
          resp=$(curl -sS --fail-with-body -H "Authorization: Bearer $CF_API_TOKEN" \
            "https://api.cloudflare.com/client/v4/accounts/$CF_ACCOUNT_ID/pages/projects/futokoro-com")
          ok=$(echo "$resp" | jq -r '.success')
          id=$(echo "$resp" | jq -r '.result.canonical_deployment.id // ""')
          # rollback 検証用に、現行serving本番デプロイの *.pages.dev URL も控える。
          # （カスタムドメイン futokoro.app はゾーンの Bot 対策で CI から 403 されるため smoke に使えない）
          dep_url=$(echo "$resp" | jq -r '.result.canonical_deployment.url // ""')
          # rollback 先（現行serving本番デプロイ）を特定できなければ本番 deploy を中止（fail closed）。
          # ここで止めれば本番は現行の正常版のまま＝壊さない。
          if [ "$ok" != "true" ] || [ -z "$id" ]; then
            echo "::error::canonical_deployment を特定できず（success=$ok id=${id:-<empty>}）。rollback 先不明のため本番 deploy を中止。"
            exit 1
          fi
          echo "id=$id" >> "$GITHUB_OUTPUT"
          echo "url=$dep_url" >> "$GITHUB_OUTPUT"
          echo "currently-serving production deployment id = $id / url = $dep_url"
      - name: Mark production deploy attempted
        id: attempt
        # この step 以降の失敗のみ「本番に触れた失敗」＝rollback 対象。
        # build/capture など deploy 前の失敗では attempted が立たず rollback は走らない。
        run: echo "attempted=true" >> "$GITHUB_OUTPUT"
      - name: Deploy production to Cloudflare Pages
        id: deploy_production
        uses: cloudflare/wrangler-action@da0e0dfe58b7a431659754fdf3f186c529afbe65 # v3.14.1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=futokoro-com --branch=main
      - name: Smoke test production deployment URL
        # カスタムドメイン futokoro.app はゾーンの Bot 対策で CI(データセンターIP) を 403 する偽陰性が出る。
        # 今デプロイした *.pages.dev デプロイURL（Bot対策の外）を smoke して「新ビルドが正しく配信」を検証する。
        # 本番昇格＝production ブランチへの deploy 成功時点でカスタムドメインの alias は自動更新される。
        env:
          SMOKE_URL: ${{ steps.deploy_production.outputs.deployment-url }}
        run: node scripts/smoke-http.mjs

  # ── ④ auto-rollback（本番 deploy/smoke 失敗時のみ）─────────────────────────
  #   現行コミット（smoke-http.mjs を含む）を checkout し、CF API で last-known-good
  #   本番デプロイへ rollback → 本番URLを再 smoke。git の再ビルドはしない。
  rollback:
    needs: deploy-production
    # deploy-production が「実際に本番 deploy を試みて失敗した」時だけ走る。
    # preview 失敗→deploy-production skipped や、deploy 前(build等)の失敗では走らない。
    if: ${{ failure() && needs.deploy-production.result == 'failure' && needs.deploy-production.outputs.production_attempted == 'true' }}
    runs-on: ubuntu-latest
    environment: production
    # rollback が発火したら必ず Slack へ鳴らす（サイレントな本番巻き戻しを潰す）。
    # SLACK_WEBHOOK_URL secret 未設定なら通知step は skip（パイプラインは止めない）。
    env:
      SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
    # rollback 同士を直列化（複数の本番失敗が並走して競合 rollback にならないように）
    concurrency:
      group: deploy-production-rollback
      cancel-in-progress: false
    steps:
      # 現行コミットを checkout（smoke-http.mjs はこのコミットに存在＝Codex High-1 対応）
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: 20
      - name: Rollback to last-known-good production deployment
        env:
          CF_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CF_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          LKG_ID: ${{ needs.deploy-production.outputs.lkg_id }}
        run: |
          set -euo pipefail
          if [ -z "$LKG_ID" ]; then
            echo "::error::last-known-good 本番デプロイを特定できず auto-rollback 不可。手動対応が必要。"
            exit 1
          fi
          echo "rolling back production to deployment $LKG_ID"
          resp=$(curl -sS -X POST -H "Authorization: Bearer $CF_API_TOKEN" \
            "https://api.cloudflare.com/client/v4/accounts/$CF_ACCOUNT_ID/pages/projects/futokoro-com/deployments/$LKG_ID/rollback")
          ok=$(echo "$resp" | jq -r '.success')
          if [ "$ok" != "true" ]; then
            echo "::error::CF rollback API 失敗: $(echo "$resp" | jq -c '.errors')"
            exit 1
          fi
      - name: Verify rollback
        id: verify_rollback
        # rollback 後の canonical = last-known-good デプロイ。その *.pages.dev URL を smoke する
        # （futokoro.app はゾーン Bot 対策で 403 偽陰性のため使わない）。URL 不明時はカスタムドメインに退避。
        env:
          SMOKE_URL: ${{ needs.deploy-production.outputs.lkg_url || 'https://futokoro.app' }}
        run: node scripts/smoke-http.mjs
      # rollback が走った時点で（成功・失敗とも）必ず Slack 通知。always() で Verify 失敗後も実行。
      - name: Notify Slack (rollback fired)
        if: ${{ always() && env.SLACK_WEBHOOK_URL != '' }}
        env:
          OUTCOME: ${{ steps.verify_rollback.outcome }}
          LKG_ID: ${{ needs.deploy-production.outputs.lkg_id }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -euo pipefail
          if [ "$OUTCOME" = "success" ]; then
            text="⚠️ [ふところ.com] 本番smoke失敗→auto-rollback成功（last-known-good=$LKG_ID へ巻き戻し・再smoke pass）。pushした新版は本番未反映＝要原因確認: $RUN_URL"
          else
            text="🚨 [ふところ.com] 本番smoke失敗かつauto-rollback失敗/不可（verify=$OUTCOME）。本番が不正状態の可能性・手動対応が必要: $RUN_URL"
          fi
          payload=$(jq -nc --arg t "$text" '{text:$t}')
          curl -sS -X POST -H 'Content-Type: application/json' -d "$payload" "$SLACK_WEBHOOK_URL" >/dev/null
      - name: Note (rollback recovered)
        if: ${{ steps.verify_rollback.outcome == 'success' }}
        run: echo "::warning::auto-rollback 成功（last-known-good=${{ needs.deploy-production.outputs.lkg_id }} へ巻き戻し・smoke pass）。Slack通知済み・board へ要記録。"
      - name: Fail job when not recovered
        if: ${{ steps.verify_rollback.outcome != 'success' }}
        run: |
          echo "::error::本番 smoke 失敗かつ auto-rollback 失敗/不可。本番が不正状態の可能性。手動対応が必要。Slack通知済み。"
          exit 1
