<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="google-adsense-account" content="ca-pub-6477824591201996">
    <meta name="description" content="ふところ.comへの要望・不具合を、匿名で送れる問い合わせフォームです。お名前・メール・金額は不要・保存しません。">
    <meta name="robots" content="noindex,follow">
    <title>要望・問い合わせ | ふところ.com</title>
    <link rel="stylesheet" href="./styles.css">
  </head>
  <body>
    <main class="app-shell document-shell">
      <header class="app-header">
        <div>
          <p class="eyebrow">匿名で送れます</p>
          <h1>要望・問い合わせ</h1>
        </div>
        <a class="text-link" href="./index.html">シミュレーターへ戻る</a>
      </header>

      <section class="panel document-panel">
        <h2>このフォームの方針</h2>
        <p>
          お名前・メールアドレスは不要で、<strong>匿名</strong>で送れます。送信内容は<strong>サーバーに保存せず</strong>、運営の通知先へ転送するだけです。計算ページ（入力・結果）は従来どおり保存も送信もしません。
        </p>

        <h2>書いてよいもの</h2>
        <p>端末、ブラウザ、画面名、起きたこと、期待したこと、再現手順、追加してほしい機能の理由。</p>

        <h2>書かないでください</h2>
        <p>家計の具体額、口座やカードの情報、勤務先、病歴、お名前・連絡先など。必要なら「カード支払いが大きい月」のように丸めて書いてください。</p>

        <form id="fbForm" class="fb-form" autocomplete="off">
          <label class="fb-field">
            <span class="fb-label">種類</span>
            <select id="fbKind" name="kind">
              <option>要望</option>
              <option>不具合</option>
              <option>表示くずれ</option>
              <option>その他</option>
            </select>
          </label>
          <label class="fb-field">
            <span class="fb-label">内容</span>
            <span class="label-help">お名前・メール・金額・個人情報は書かないでください。匿名で送れます。</span>
            <textarea id="fbMessage" name="message" maxlength="2000" rows="7" required
              placeholder="例: Android Chrome の金額表タブで、横スクロールが出て見づらかった"></textarea>
          </label>
          <div class="cf-turnstile" data-sitekey="0x4AAAAAADpKPPp-pBYFmYwu" data-size="compact"></div>
          <button type="submit" id="fbSubmit" class="fb-submit">匿名で送る</button>
          <p id="fbResult" class="fb-result" role="status" aria-live="polite"></p>
        </form>
        <p class="note">送信内容は保存しません。入力した金額や試算結果は含めないでください。</p>
      </section>
      <script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>
      <script src="./feedback.js"></script>
    </main>
  </body>
</html>
